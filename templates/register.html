{% extends "layout.html" %}
{% block title %}Sign Up — Nourish Collective{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm p-4">
      <div class="text-center mb-4">
        <i class="bi bi-tree-fill text-success fs-1"></i>
        <h4 class="fw-bold mt-2">Create an Account</h4>
        <p class="text-muted small">Join Nourish Collective and start making an impact.</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Full Name</label>
          <input type="text" class="form-control" name="full_name" placeholder="Jane Doe" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Email Address</label>
          <input type="email" class="form-control" name="email" placeholder="jane@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">I want to join as a</label>
          <select class="form-select" name="role" required>
            <option value="">Select your role</option>
            <option value="donor">Corporate Donor</option>
            <option value="ngo">Community Partner (NGO)</option>
          </select>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Password</label>
            <input type="password" class="form-control" name="password" placeholder="Min 6 characters" required minlength="6" />
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" placeholder="Repeat password" required />
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 rounded-pill">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <div class="text-center mt-4 pt-3 border-top">
        <p class="small text-muted">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="text-success fw-semibold">Log In</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
